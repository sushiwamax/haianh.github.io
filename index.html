<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NLLB Translator</title>

    <!-- Bootstrap + FontAwesome + Animate.css -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">

    <style>
        :root {
            --bg-color: linear-gradient(135deg, #667eea 0%, #764ba2 100%), url('https://source.unsplash.com/featured/?language,translation') no-repeat center center fixed;
            --container-bg: rgba(255, 255, 255, 0.9);
            --card-bg: #ffffff;
            --text-color: #000000;
            --result-bg: #f8f9fa;
            --history-bg: #f1f3f5;
            --history-hover: #e3f2fd;
            --btn-primary: #007bff;
            --btn-success: #28a745;
            --btn-secondary: #6c757d;
            --btn-danger: #dc3545;
            --form-bg: #ffffff;
            --form-text: #000000;
        }

        body.dark-mode {
            --bg-color: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            --container-bg: rgba(33, 37, 41, 0.9);
            --card-bg: #343a40;
            --text-color: #ffffff;
            --result-bg: #495057;
            --history-bg: #495057;
            --history-hover: #6c757d;
            --btn-primary: #0d6efd;
            --btn-success: #198754;
            --btn-secondary: #5c636a;
            --btn-danger: #dc3545;
            --form-bg: #495057;
            --form-text: #ffffff;
        }

        body {
            background: var(--bg-color);
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-color);
            transition: background 0.3s ease, color 0.3s ease;
        }

        .container {
            background: var(--container-bg);
            border-radius: 15px;
            padding: 30px;
            max-width: 1000px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: fadeIn 1s ease-in;
            transition: background 0.3s ease;
        }

        .card {
            background: var(--card-bg);
            border: none;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: background 0.3s ease;
        }

        .result {
            margin-top: 15px;
            padding: 15px;
            background: var(--result-bg);
            border-left: 5px solid var(--btn-primary);
            border-radius: 8px;
            transition: background 0.3s ease;
            color: var(--text-color); /* Đảm bảo text trong result trắng */
        }

        .error {
            color: #dc3545;
            font-weight: bold;
        }

        .history-box {
            max-height: 420px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .history-item {
            background: var(--history-bg);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
            transition: background 0.3s ease;
            color: var(--text-color); /* Đảm bảo text trong history trắng */
        }

        .history-item:hover {
            background: var(--history-hover);
        }

        .lang-icon {
            margin-right: 8px;
        }

        .btn {
            border-radius: 20px;
            transition: background 0.3s ease;
            color: #ffffff !important; /* Text button luôn trắng */
        }

        .btn-primary { background-color: var(--btn-primary); }
        .btn-success { background-color: var(--btn-success); }
        .btn-secondary { background-color: var(--btn-secondary); }
        .btn-danger { background-color: var(--btn-danger); }

        /* Form elements: textarea, select */
        .form-control, .form-select {
            background: var(--form-bg);
            color: var(--form-text);
            border: 1px solid var(--history-bg);
            transition: background 0.3s ease, color 0.3s ease;
        }

        .form-control::placeholder {
            color: var(--text-color);
            opacity: 0.6;
        }

        /* Labels và tất cả text elements */
        .form-label, h4, h5, small, b, i {
            color: var(--text-color); /* Force tất cả text elements trắng trong dark mode */
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: var(--card-bg);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: background 0.3s ease;
            color: var(--text-color);
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            .history-box {
                max-height: 300px;
            }
            .theme-toggle {
                top: 10px;
                right: 10px;
                width: 40px;
                height: 40px;
            }
        }
    </style>
</head>
<body>

<!-- Theme Toggle Button -->
<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">
    <i class="fas fa-sun"></i>
</button>

<div class="container">
    <div class="row">

        <!-- ================= LEFT: TRANSLATOR ================= -->
        <div class="col-md-7">
            <div class="card p-4 mb-4">
                <h4 class="text-center mb-4">
                    <i class="fas fa-language"></i> NLLB Translator
                </h4>

                <div class="mb-3">
                    <label class="form-label"><i class="fas fa-edit lang-icon"></i> Văn bản cần dịch</label>
                    <textarea id="text" class="form-control" rows="4"></textarea>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label"><i class="fas fa-globe lang-icon"></i> Ngôn ngữ nguồn</label>
                        <select id="source_lang" class="form-select">
                            <option value="en">🇺🇸 English</option>
                            <option value="vi">🇻🇳 Vietnamese</option>
                            <option value="fr">🇫🇷 French</option>
                            <option value="es">🇪🇸 Spanish</option>
                            <option value="de">🇩🇪 German</option>
                            <option value="ru">🇷🇺 Russian</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label"><i class="fas fa-globe lang-icon"></i> Ngôn ngữ đích</label>
                        <select id="target_lang" class="form-select">
                            <option value="vi">🇻🇳 Vietnamese</option>
                            <option value="en">🇺🇸 English</option>
                            <option value="fr">🇫🇷 French</option>
                            <option value="es">🇪🇸 Spanish</option>
                            <option value="de">🇩🇪 German</option>
                            <option value="ru">🇷🇺 Russian</option>
                        </select>
                    </div>
                </div>

               <div class="text-center mb-3">
    <button onclick="translateText()" class="btn btn-primary">
        <i class="fas fa-exchange-alt"></i> Dịch
    </button>

    <button onclick="speakText()" class="btn btn-success ms-2">
        <i class="fas fa-volume-up"></i> Nghe
    </button>

    <button onclick="stopSpeak()" class="btn btn-danger ms-2">
        <i class="fas fa-stop"></i> Dừng
    </button>

    <button onclick="swapLanguages()" class="btn btn-secondary ms-2">
        <i class="fas fa-arrows-alt-h"></i> Swap
    </button>
</div>


                <div id="result" class="result" style="display:none;"></div>
            </div>
        </div>

        <!-- ================= RIGHT: HISTORY ================= -->
        <div class="col-md-5">
            <div class="card p-4">
                <h5 class="mb-3">
                    <i class="fas fa-history"></i> Lịch sử tra cứu
                </h5>

                <div id="history" class="history-box"></div>

                <div class="text-end mt-2">
                    <button class="btn btn-sm btn-danger" onclick="clearHistory()">
                        <i class="fas fa-trash"></i> Xóa lịch sử
                    </button>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
const API_URL = "https://haichim25-nllb-translator-api.hf.space/api/translate";
let currentUtterance = null;

// ================= TRANSLATE =================
async function translateText() {
    stopSpeak(); // dừng đọc nếu đang nói

    const text = document.getElementById("text").value;
    const source_lang = document.getElementById("source_lang").value;
    const target_lang = document.getElementById("target_lang").value;
    const resultDiv = document.getElementById("result");

    if (!text) {
        alert("Vui lòng nhập văn bản");
        return;
    }

    resultDiv.style.display = "block";
    resultDiv.innerHTML = "⏳ Đang dịch...";

    try {
        const res = await fetch('https://haichim25-email-phishing-analyzer.hf.space/analyze',
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text, source_lang, target_lang })
        });

        const data = await res.json();

        if (data.translated) {
            resultDiv.innerHTML = `<b>Kết quả:</b><br>${data.translated}`;
            saveHistory(text, data.translated, source_lang, target_lang);
            loadHistory();
        } else {
            resultDiv.innerHTML = `<span class="error">${data.error}</span>`;
        }
    } catch {
        resultDiv.innerHTML = `<span class="error">Lỗi kết nối API</span>`;
    }
}

// ================= SPEAK =================
function speakText() {
    stopSpeak(); // tránh chồng tiếng

    const resultDiv = document.getElementById("result");
    const text = resultDiv.innerText.replace("Kết quả:", "").trim();
    if (!text) {
        alert("Chưa có nội dung để đọc");
        return;
    }

    const targetLang = document.getElementById("target_lang").value;

    const langMap = {
        vi: "vi-VN",
        en: "en-US",
        fr: "fr-FR",
        es: "es-ES",
        de: "de-DE",
        ru: "ru-RU"
    };

    currentUtterance = new SpeechSynthesisUtterance(text);
    currentUtterance.lang = langMap[targetLang] || "en-US";
    currentUtterance.rate = 1;
    currentUtterance.pitch = 1;

    speechSynthesis.speak(currentUtterance);
}

// ================= STOP SPEAK =================
function stopSpeak() {
    if (speechSynthesis.speaking || speechSynthesis.pending) {
        speechSynthesis.cancel();
    }
}

// ================= HISTORY =================
function saveHistory(src, tgt, sLang, tLang) {
    const history = JSON.parse(localStorage.getItem("history") || "[]");
    history.unshift({
        src, tgt, sLang, tLang,
        time: new Date().toLocaleString()
    });
    localStorage.setItem("history", JSON.stringify(history.slice(0, 20)));
}

function loadHistory() {
    const history = JSON.parse(localStorage.getItem("history") || "[]");
    const box = document.getElementById("history");
    box.innerHTML = "";

    history.forEach(h => {
        box.innerHTML += `
            <div class="history-item">
                <b>${h.sLang} → ${h.tLang}</b><br>
                <small>${h.time}</small><br>
                <i>${h.src}</i><br>
                <b>${h.tgt}</b>
            </div>
        `;
    });
}

function clearHistory() {
    localStorage.removeItem("history");
    loadHistory();
}

// ================= SWAP =================
function swapLanguages() {
    const src = document.getElementById("source_lang");
    const tgt = document.getElementById("target_lang");
    [src.value, tgt.value] = [tgt.value, src.value];
}

loadHistory();
</script>
</body>
</html>
